<svg viewBox="0 0 900 505" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a0e2e"/>
      <stop offset="100%" stop-color="#170b28"/>
    </linearGradient>
    <linearGradient id="fillGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5c7"/>
      <stop offset="100%" stop-color="#7c5cff"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="898" height="503" rx="16" fill="url(#cardBg)" stroke="#3a2660"/>

  <text x="40" y="46" font-family="'Courier New', monospace" font-size="13" letter-spacing="2" fill="#6de3c8">$ CAT SOBRE_MIM.MD</text>
  <text x="40" y="78" font-family="'Courier New', monospace" font-size="24" font-weight="bold" fill="#f2f5fb">Estudante de Engenharia de Software</text>

  <!-- section 1: timeline -->
  <text x="40" y="118" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#c9c1e0">Formação — 2024 → 2029</text>

  <rect x="40" y="132" width="820" height="8" rx="4" fill="#2a1f42"/>
  <rect x="40" y="132" height="8" rx="4" fill="url(#fillGrad)">
    <animate attributeName="width" from="0" to="410" dur="1.6s" fill="freeze" />
  </rect>
  <g>
    <animateTransform attributeName="transform" type="translate" from="40,0" to="450,0" dur="1.6s" fill="freeze" />
    <path d="M0 118 L-11 123 L0 128 L11 123 Z" fill="#00e5c7"/>
  </g>

  <text x="40" y="168" font-family="'Courier New', monospace" font-size="12" fill="#8a7ba8">2024</text>
  <text x="440" y="168" font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#00e5c7">2026</text>
  <text x="850" y="168" font-family="'Courier New', monospace" font-size="12" fill="#8a7ba8" text-anchor="end">2029</text>

  <text x="40" y="196" font-family="Arial, sans-serif" font-size="13" fill="#a99bd1">Passando por <tspan font-weight="bold" fill="#e9e3f5">2 de 5 anos</tspan> do curso — aplicando o que aprendo direto em produção.</text>

  <!-- section 2: pipeline -->
  <text x="40" y="240" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#c9c1e0">Rota de interesse</text>

  <rect x="40" y="256" width="230" height="60" rx="10" fill="#221338" stroke="#3a2660"/>
  <text x="155" y="291" font-family="'Courier New', monospace" font-size="15" font-weight="bold" fill="#f2f5fb" text-anchor="middle">Dados</text>

  <rect x="335" y="256" width="230" height="60" rx="10" fill="#221338" stroke="#3a2660"/>
  <text x="450" y="291" font-family="'Courier New', monospace" font-size="15" font-weight="bold" fill="#f2f5fb" text-anchor="middle">Backend</text>

  <rect x="630" y="256" width="230" height="60" rx="10" fill="#241539" stroke="#7c5cff"/>
  <text x="745" y="291" font-family="'Courier New', monospace" font-size="15" font-weight="bold" fill="#b8a8ff" text-anchor="middle">IA</text>

  <line x1="270" y1="286" x2="335" y2="286" stroke="#4a3670" stroke-width="2"/>
  <line x1="565" y1="286" x2="630" y2="286" stroke="#4a3670" stroke-width="2"/>

  <circle r="4.5" fill="#00e5c7">
    <animateMotion dur="2s" repeatCount="indefinite" path="M270,286 L335,286" />
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle r="4.5" fill="#00e5c7">
    <animateMotion dur="2s" begin="0.9s" repeatCount="indefinite" path="M565,286 L630,286" />
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2s" begin="0.9s" repeatCount="indefinite" />
  </circle>

  <text x="40" y="336" font-family="Arial, sans-serif" font-size="13" fill="#a99bd1">Foco atual em <tspan font-weight="bold" fill="#e9e3f5">Backend e Dados</tspan>, com meta de seguir futuramente para <tspan font-weight="bold" fill="#b8a8ff">Inteligência Artificial</tspan>.</text>

  <!-- section 3: status -->
  <text x="40" y="360" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#c9c1e0">Atualmente</text>

  <rect x="40" y="376" width="820" height="107" rx="12" fill="#1f1233" stroke="#3a2660"/>
  <circle cx="66" cy="398" r="5" fill="#6de3c8">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite" />
  </circle>
  <circle cx="66" cy="398" r="5" fill="none" stroke="#6de3c8" stroke-width="1.5">
    <animate attributeName="r" values="5;13;5" dur="1.8s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.6;0;0.6" dur="1.8s" repeatCount="indefinite" />
  </circle>

  <text x="88" y="402" font-family="Arial, sans-serif" font-size="13" fill="#c9c1e0">Desenvolvedor na <tspan font-weight="bold" fill="#f2f5fb">CJR (empresa júnior)</tspan>, evoluindo habilidades técnicas e pessoais.</text>

  <g font-family="'Courier New', monospace" font-size="11" fill="#6de3c8">
    <rect x="88" y="415" width="88" height="22" rx="11" fill="#2a1f42" stroke="#3a2660"/>
    <text x="132" y="430" text-anchor="middle">JavaScript</text>
    <rect x="184" y="415" width="88" height="22" rx="11" fill="#2a1f42" stroke="#3a2660"/>
    <text x="228" y="430" text-anchor="middle">TypeScript</text>
    <rect x="280" y="415" width="72" height="22" rx="11" fill="#2a1f42" stroke="#3a2660"/>
    <text x="316" y="430" text-anchor="middle">NestJS</text>
    <rect x="360" y="415" width="80" height="22" rx="11" fill="#2a1f42" stroke="#3a2660"/>
    <text x="400" y="430" text-anchor="middle">Node.js</text>
  </g>

  <line x1="88" y1="448" x2="808" y2="448" stroke="#3a2660" stroke-width="1"/>
  <circle cx="93" cy="465" r="4" fill="#7c5cff">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.8s" repeatCount="indefinite" />
  </circle>
  <text x="106" y="469" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#b8a8ff">Em busca de uma oportunidade de estágio</text>
</svg>
